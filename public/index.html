<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulls&Bears - Stock Trading Ideas</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand"><img src="logo.jpeg" alt="Bulls&Bears" class="logo-img"> Bulls&Bears</div>
            <div class="nav-menu">
                <a href="index.html" class="nav-link active">View Ideas</a>
                <a href="admin.html" class="nav-link">Admin Portal</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <section class="hero">
            <h1>🐂 Bulls & 🐻 Bears Trading Ideas</h1>
            <p>Navigate market opportunities with expert stock analysis and insights</p>
        </section>

        <div class="filters">
            <input type="text" id="searchInput" placeholder="Search by ticker or company..." class="search-box">
            <select id="filterStatus" class="filter-select">
                <option value="">All Status</option>
                <option value="active">Active</option>
                <option value="closed">Closed</option>
                <option value="updated">Updated</option>
            </select>
            <select id="filterTimeframe" class="filter-select">
                <option value="">All Timeframes</option>
                <option value="short-term">Short-term (< 1 month)</option>
                <option value="medium-term">Medium-term (1-3 months)</option>
                <option value="long-term">Long-term (> 3 months)</option>
            </select>
        </div>

        <div id="stocksContainer" class="stocks-grid">
            <div class="loading">Loading stock ideas...</div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 Bulls&Bears Trading Platform. Navigate the market with confidence. 📈</p>
    </footer>

    <script src="js/app.js"></script>
    <script>
        // Load stocks on page load
        loadStocks();
        
        // Event listeners
        document.getElementById('searchInput').addEventListener('input', filterStocks);
        document.getElementById('filterStatus').addEventListener('change', filterStocks);
        document.getElementById('filterTimeframe').addEventListener('change', filterStocks);
    </script>
</body>
</html>
